#####################################################
#                                                   #
# +---------------------------------+               #
# |  +------+   +------+   +------+ |               #
# |  |  CU  |---|  DU  |---|  RU  | |               #
# |  +------+   +------+   |Liteon| | cu-du-liteon  #
# |     |                  +------+ |               #
# +-----|---------------------------+               #
#       |                                           #
#       |  CU–DU interface (F1)                     #
#       |                                           #
#       |                                           #
# +-----|---------------------------+               #
# |  +------+   +-------+           |               #
# |  |  DU  |---|  RU   |           |               #
# |  +------+   |Benetel|           |  du-benetel   #
# |             +-------+           |               #
# +---------------------------------+               #
#                                                   #
#####################################################

apiVersion: athena.trirematics.io/v1
kind: Network
metadata:
    name: handover
    namespace: trirematics
spec:
    slices:
        -   plmn: "00101"
            dnn: internet
            network-mode: IPv4
            service-type: eMBB
            differentiator: 0x000000
            ipv4-range: 12.1.1.0/24
            ipv6-range: 2001:db8:1::/64
    access:
        -   name: cu-du-liteon
            stack: 5g-sa
            model: oai-ran/cu-du-ru
            identity:
                an-id: 30
                tracking-area: 1
            radio:
                device: oran-7.2
                antenna:
                    formation: 4x4
            annotations:
                extras.t9s.io/ru-vendor: 'liteon'
            cells:
                -   band: n78
                    arfcn: 646656 # 623424 #630048
                    bandwidth: 100MHz
                    subcarrier-spacing: 30kHz
                    tdd-config:
                        period: 2.5ms
                        dl-slots: 3
                        dl-symbols: 6
                        ul-slots: 1
                        ul-symbols: 4
                    groups:
                        -   kind: hog
                            name: handover-group
            controller: flexric.handover
            core-networks:
                - open5gs.handover
        -   name: du-benetel
            stack: 5g-sa
            model: oai-ran/du-ru
            identity:
                an-id: 20
                tracking-area: 1
            radio:
                device: oran-7.2
                antenna:
                    formation: 4x4
            annotations:
                extras.t9s.io/ru-vendor: 'liteon'
                extras.t9s.io/cu-name: "cu-du-liteon"
            cells:
                -   band: n77
                    arfcn: 673344 # 663360 # 650112  #673344
                    bandwidth: 100MHz
                    subcarrier-spacing: 30kHz
                    tdd-config:
                        period: 5ms
                        dl-slots: 7
                        dl-symbols: 6
                        ul-slots: 2
                        ul-symbols: 4
                    groups:
                        -   kind: hog
                            name: handover-group
            controller: flexric.handover
            core-networks:
                - open5gs.handover
    edge:
        -   name: flexric
            stack: 5g-sa
            model: mosaic5g/flexric
    core:
        -   name: open5gs
            stack: 5g-sa
            model: open5gs/5gc
            scheduling:
                nodeName: bubble1
            profiles:
                - debug
            identity:
                region: 128
                cn-group: 4
                cn-id: 5
    dns:
        ipv4:
            default: 8.8.8.8
            secondary: 8.8.4.4
